        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);

            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        function parseFlexibleDate(dateStr) {
            if (!dateStr) return new Date('');
            if (!isNaN(dateStr) && parseInt(dateStr, 10) > 30000) {
                const excelEpoch = new Date(1899, 11, 30);
                return new Date(excelEpoch.getTime() + parseInt(dateStr, 10) * 86400000);
            }
            const parts = dateStr.trim().split(/[\.\-\/]/);
            if (parts.length === 3) {
                let day, month, year;
                if (parts[0].length === 4) { year = parseInt(parts[0], 10); month = parseInt(parts[1], 10) - 1; day = parseInt(parts[2], 10); } 
                else { day = parseInt(parts[0], 10); month = parseInt(parts[1], 10) - 1; year = parseInt(parts[2], 10); if (year < 100) year += 2000; }
                const parsed = new Date(year, month, day);
                if (!isNaN(parsed)) return parsed;
            }
            return new Date(dateStr);
        }

        function parseFlexibleTime(timeStr) {
            if (!timeStr) return '14:00';
            timeStr = timeStr.toString().trim();
            if (!isNaN(timeStr) && timeStr.includes('.')) {
                const fraction = parseFloat(timeStr);
                if (fraction >= 0 && fraction < 1) {
                    const totalMinutes = Math.round(fraction * 24 * 60);
                    const h = Math.floor(totalMinutes / 60) % 24;
                    const m = totalMinutes % 60;
                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                }
            }
            const ampmMatch = timeStr.match(/(\d{1,2})[:\.]?(\d{2})?\s*([AP]M)/i);
            if (ampmMatch) {
                let h = parseInt(ampmMatch[1], 10);
                const m = ampmMatch[2] || '00';
                const modifier = ampmMatch[3].toUpperCase();
                if (h === 12) h = 0; if (modifier === 'PM') h += 12;
                return `${String(h).padStart(2, '0')}:${m}`;
            }
            const timeMatch = timeStr.match(/(\d{1,2})[:\.](\d{2})/);
            if (timeMatch) return `${String(timeMatch[1]).padStart(2, '0')}:${timeMatch[2]}`;
            
            const hourMatch = timeStr.match(/^(\d{1,2})$/);
            if (hourMatch) {
                 const h = parseInt(hourMatch[1], 10);
                 if (h >= 0 && h < 24) return `${String(h).padStart(2, '0')}:00`;
            }
            return '14:00';
        }

        function sortFixturesByDate(fixtures) {
            fixtures.sort((a, b) => parseFlexibleDate(a.date) - parseFlexibleDate(b.date));
            fixtures.forEach(round => {
                if(round.matches) {
                    round.matches.sort((m1, m2) => {
                        const t1 = m1.time || "00:00";
                        const t2 = m2.time || "00:00";
                        return t1.localeCompare(t2);
                    });
                }
            });
            return fixtures;
        }

        function formatDateToLeagueString(dateObj) {
            const dayNames = ['PAZAR', 'PAZARTESİ', 'SALI', 'ÇARŞAMBA', 'PERŞEMBE', 'CUMA', 'CUMARTESİ'];
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year = dateObj.getFullYear();
            const dayName = dayNames[dateObj.getDay()];
            return `${day}.${month}.${year} ${dayName}`;
        }

        // --- EKRAN HESAPLAMALARI VE RENDER FONKSİYONLARI ---
        function calculateGroupStandings(targetGroup) {
            const currentLeague = state.leagues[state.activeSport];
            const stats = {};
            const groupTeams = currentLeague.teams.filter(t => t.group === targetGroup);
            
            groupTeams.forEach(team => {
                stats[team.id] = { id: team.id, name: team.name, played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, gd: 0, points: 0, group: team.group, redCards: 0, manager: team.manager, coach: team.coach };
            });

            currentLeague.fixtures.forEach(round => {
                round.matches.forEach(match => {
                    if (match.isKnockout) return;

                    if(match.cards) { match.cards.forEach(card => { if(stats[card.teamId]) stats[card.teamId].redCards++; }); }

                    if (match.homeScore !== '' && match.awayScore !== '') {
                        const hScore = parseFloat(match.homeScore);
                        const aScore = parseFloat(match.awayScore);
                        if (stats[match.home.id] && stats[match.away.id]) {
                            if(getTeam(match.home.id, state.activeSport).group === targetGroup || getTeam(match.away.id, state.activeSport).group === targetGroup) {
                                stats[match.home.id].played++; stats[match.away.id].played++;
                                stats[match.home.id].gf += hScore; stats[match.home.id].ga += aScore; stats[match.home.id].gd += (hScore - aScore);
                                stats[match.away.id].gf += aScore; stats[match.away.id].ga += hScore; stats[match.away.id].gd += (aScore - hScore);
                                
                                if (state.activeSport.includes('basketbol')) {
                                    if (hScore > aScore) { stats[match.home.id].won++; stats[match.home.id].points += 2; stats[match.away.id].lost++; stats[match.away.id].points += 1; }
                                    else if (aScore > hScore) { stats[match.away.id].won++; stats[match.away.id].points += 2; stats[match.home.id].lost++; stats[match.home.id].points += 1; }
                                    else { stats[match.home.id].drawn++; stats[match.home.id].points += 1; stats[match.away.id].drawn++; stats[match.away.id].points += 1; }
                                } else if (state.activeSport.includes('voleybol')) { 
                                    if (hScore > aScore) {
                                        stats[match.home.id].won++; stats[match.away.id].lost++;
                                        if (hScore === 3 && aScore < 2) { stats[match.home.id].points += 3; }
                                        else if (hScore === 3 && aScore === 2) { stats[match.home.id].points += 2; stats[match.away.id].points += 1; }
                                        else { stats[match.home.id].points += 3; }
                                    } else if (aScore > hScore) {
                                        stats[match.away.id].won++; stats[match.home.id].lost++;
                                        if (aScore === 3 && hScore < 2) { stats[match.away.id].points += 3; }
                                        else if (aScore === 3 && hScore === 2) { stats[match.away.id].points += 2; stats[match.home.id].points += 1; }
                                        else { stats[match.away.id].points += 3; }
                                    } else { stats[match.home.id].points += 1; stats[match.away.id].points += 1; }
                                } else {
                                    if (hScore > aScore) { stats[match.home.id].won++; stats[match.home.id].points += 3; stats[match.away.id].lost++; }
                                    else if (aScore > hScore) { stats[match.away.id].won++; stats[match.away.id].points += 3; stats[match.home.id].lost++; }
                                    else { stats[match.home.id].drawn++; stats[match.home.id].points += 1; stats[match.away.id].drawn++; stats[match.away.id].points += 1; }
                                }
                            }
                        }
                    }
                });
            });

            return Object.values(stats).sort((a, b) => b.points - a.points || b.gd - a.gd || b.gf - a.gf);
        }

        function renderKnockout(isEmbedded = false) {
            const league = state.leagues[state.activeSport];
            const kn = league.knockouts || DEFAULT_KNOCKOUT;
            const teams = league.teams;

            const renderMatchBox = (match, stage, index) => {
                const hName = getTeam(match.h, state.activeSport).name;
                const aName = getTeam(match.a, state.activeSport).name;

                let isHomeWinner = false;
                let isAwayWinner = false;
                let isPlayed = match.hs !== '' && match.as !== '';
                if(isPlayed) {
                    if (parseFloat(match.hs) > parseFloat(match.as)) isHomeWinner = true;
                    else if (parseFloat(match.as) > parseFloat(match.hs)) isAwayWinner = true;
                }

                let homeClassRO = isHomeWinner ? "font-black text-gray-900 text-base" : (isAwayWinner ? "font-medium text-gray-400" : "font-bold text-gray-700");
                let awayClassRO = isAwayWinner ? "font-black text-gray-900 text-base" : (isHomeWinner ? "font-medium text-gray-400" : "font-bold text-gray-700");

                if (state.isLoggedIn) {
                    return `
                        <div class="bg-white border-2 border-gray-100 rounded-xl p-3 shadow-sm hover:shadow-md transition-shadow text-xs">

                            </div>
                            <div class="flex gap-2 items-center">
                                <select id="ko_a_${stage}_${index}" class="w-full border border-gray-200 rounded-lg p-1.5 outline-none bg-gray-50 focus:ring-2 focus:ring-blue-400 font-medium ${isAwayWinner ? 'text-gray-900 font-bold' : ''}" onchange="window.updateKnockout('${stage}', ${index}, 'a', this.value)">
                                    <option value="">Deplasman Seç</option>
                                    ${teams.map(t => `<option value="${t.id}" ${match.a == t.id ? 'selected' : ''}>[${t.group}] ${t.name}</option>`).join('')}
                                </select>
                                <input id="ko_as_${stage}_${index}" type="number" value="${match.as}" class="w-12 h-8 text-center border border-gray-200 rounded-lg bg-gray-50 font-heading font-bold focus:ring-2 focus:ring-blue-400 outline-none ${isAwayWinner ? 'bg-green-50 text-green-700' : ''}" onchange="window.updateKnockout('${stage}', ${index}, 'as', this.value)">
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="bg-white border-2 ${match.hs !== '' && match.hs > match.as ? 'border-green-400 shadow-green-100' : 'border-gray-100'} rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow text-sm">
                            <div class="flex justify-between items-center p-3 border-b border-gray-50 bg-gray-50/50">
                                <span class="${homeClassRO} truncate transition-all duration-300">${match.h ? hName : '-'}</span>
                                <span class="font-heading font-black text-lg bg-white border border-gray-100 px-3 rounded-lg shadow-sm ${isHomeWinner ? 'text-green-600' : 'text-gray-800'}">${match.hs !== '' ? match.hs : '-'}</span>

                            <div class="flex justify-between items-center p-3">
                                <span class="${awayClassRO} truncate transition-all duration-300">${match.a ? aName : '-'}</span>
                                <span class="font-heading font-black text-lg bg-white border border-gray-100 px-3 rounded-lg shadow-sm ${isAwayWinner ? 'text-green-600' : 'text-gray-800'}">${match.as !== '' ? match.as : '-'}</span>
                            </div>
                        </div>
                    `;
                }
            };

            return `

                        <div class="xl:col-span-1">

                                    ${state.isLoggedIn ? `<button onclick="window.toggleMatchForm()" class="bg-green-600 text-white px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-md hover:bg-green-700 active:scale-95 transition-all print:hidden">${state.showMatchForm ? 'Kapat' : '+ Yeni Maç'}</button>` : ''}

                                <div class="bg-gray-50/80 px-5 py-3 border-b border-gray-100 flex justify-between items-center print:hidden z-10">

                                            <select id="activeAway" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm bg-white font-medium focus:ring-2 focus:ring-green-400 shadow-inner">${activeLeague.teams.map(t => `<option value="${t.id}">[${t.group}] ${t.name}</option>`).join('')}</select>

                                <button onclick="window.addTeam('teamInput', 'groupSelect', 'managerInput', 'coachInput')" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold mb-8 hover:bg-blue-700 hover:shadow-lg active:scale-95 transition-all uppercase tracking-wide">Yeni Takım Ekle</button>
                                
                                <div class="space-y-2.5 mb-8 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                                    ${activeLeague.teams.map(t => `
                                        <div class="flex justify-between items-center p-3 bg-white border border-gray-100 rounded-xl text-sm shadow-[0_2px_8px_-4px_rgba(0,0,0,0.1)] hover:border-blue-100 transition-colors">
                                            <span class="font-medium text-gray-700"><span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold text-gray-500 mr-2">${t.group}</span> ${t.name}</span>
                                            <button onclick="window.removeTeam(${t.id})" class="text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-lg transition-colors">${icons.trash}</button>
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div class="pt-6 border-t border-gray-100">
                                    <button onclick="window.startLeague()" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-lg shadow-[0_4px_14px_0_rgb(34,197,94,0.39)] hover:shadow-[0_6px_20px_rgba(34,197,94,0.23)] hover:bg-green-600 active:scale-95 transition-all uppercase tracking-widest">
                                        Ligi Resmen Başlat
                                    </button>
                                </div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="bg-white/90 backdrop-blur-md rounded-3xl shadow-xl p-12 max-w-2xl mx-auto border border-gray-100 text-center fade-in mt-12">
                                <div class="w-24 h-24 bg-gray-50 text-gray-300 rounded-full flex items-center justify-center mx-auto mb-6 border border-gray-100 shadow-inner">
                                    <div class="scale-150">${icons.trophy}</div>
                                </div>
                                <h2 class="text-3xl font-heading font-black text-gray-800 mb-3 tracking-tight">Lig Henüz Başlamadı</h2>
                                <p class="text-gray-500 font-medium">Takımlar ve fikstür kesinleştiğinde veriler burada yayınlanacaktır.</p>
                            </div>
                        `;
                    }
                } else {
                    html += renderDashboard();
                }
            }

            html += `</div>`;
            app.innerHTML = html;
            
            // YENİ: Ekran render edildikten sonra odağı ve imleç pozisyonunu geri koyuyoruz
            if (activeElementId) {
                const elToFocus = document.getElementById(activeElementId);
                if (elToFocus) {
                    elToFocus.focus();
                    try {
                        if (selectionStart !== null && selectionEnd !== null) {
                            elToFocus.setSelectionRange(selectionStart, selectionEnd);
                        }
                    } catch(e) {}
                }
            }

            if(window.renderSaveStatus) window.renderSaveStatus();
        }

        render();
        initFirebase();

    </script>
</body>
</html>
