        // --- FIREBASE ENTEGRASYONU VE DURUM TAKİBİ ---
        let db;

        // Çıkış yaparken kaydedilmeyen veri varsa uyarı ver
        window.addEventListener('beforeunload', function (e) {

        async function initFirebase() {
            try {
                const configStr = window.__firebase_config;
                if (!configStr) {
                    console.warn("Firebase yapılandırması bulunamadı, yerel modda devam ediliyor.");
                    return;
                }
                const firebaseConfig = JSON.parse(configStr);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                });

                // GÜVENLİ KİMLİK DOĞRULAMA (ÖNCE AUTHENTICATION, SONRA VERİTABANI)
                try {
                    const initialAuthToken = typeof window.__initial_auth_token !== 'undefined' ? window.__initial_auth_token : null;
                    if (initialAuthToken) {
                        try {
                            await signInWithCustomToken(auth, initialAuthToken);
                        } catch (tokenError) {
                            console.warn("Özel token hatası, anonim girişe dönülüyor:", tokenError);
                            await signInAnonymously(auth);
                        }
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (authError) {
                    if (authError.code === 'auth/configuration-not-found') {
                        console.warn("BİLGİLENDİRME: Firebase Console'da 'Anonymous' (Anonim) giriş aktif değil.");
                    } else {
                        console.error("Kimlik doğrulama hatası:", authError);
                    }
                }

                // KİMLİK DOĞRULAMASI BİTTİKTEN SONRA VERİTABANINI DİNLE
                listenToState();

            } catch (error) {
                console.error("Firebase Başlatma Hatası:", error);
            }
        }

        function listenToState() {
            if (!db) return; 
            
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'appState', 'mainData');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.leagues = data.leagues || state.leagues;
                    state.predefinedTeams = data.predefinedTeams || state.predefinedTeams;
                    state.credentials = data.credentials || state.credentials;
                    state.rules = data.rules || state.rules;
                    
                    isRemoteUpdate = true;
                    try {
                        render();
                    } finally {
                        isRemoteUpdate = false;
                    }
                } else {
                    // İlk defa girildiğinde veritabanı boşsa anında ilk şablonu kaydet
                    saveState();
                }
            }, (err) => {
                console.error("Firestore Dinleme Hatası:", err);
                saveError = "Veritabanı Okuma İzni Yok (Kuralları Kontrol Edin)";
                if(window.renderSaveStatus) window.renderSaveStatus();
            });
        }

        async function saveState() {
            if (!db || isRemoteUpdate) return; 
            
            isSaving = true;
            if(window.renderSaveStatus) window.renderSaveStatus();

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'appState', 'mainData');
            try {
                const safeStateToSave = JSON.parse(JSON.stringify({
                    leagues: state.leagues,
                    predefinedTeams: state.predefinedTeams,
                    credentials: state.credentials || { username: 'admin', password: '1234' },
                    rules: state.rules || { futbol: [], futsal: [], basketbol: [], voleybol: [] }
                }));

                await setDoc(docRef, safeStateToSave);
                saveError = null;
            } catch (error) {
                console.error("Firestore Kaydetme Hatası:", error);
                saveError = "Yetki/Kural Hatası veya Kota Dolumu";
            } finally {
                isSaving = false;
                if(window.renderSaveStatus) window.renderSaveStatus();
            }
        }

            return state.leagues[leagueType].teams.find(t => t.id == id) || { name: 'Seçilmedi', group: '?', manager: '', coach: '' };
        }

        function parseFlexibleDate(dateStr) {
            if (!dateStr) return new Date('');
            if (!isNaN(dateStr) && parseInt(dateStr, 10) > 30000) {
                const excelEpoch = new Date(1899, 11, 30);
                return new Date(excelEpoch.getTime() + parseInt(dateStr, 10) * 86400000);
            }
            const parts = dateStr.trim().split(/[\.\-\/]/);
            if (parts.length === 3) {
                let day, month, year;
                if (parts[0].length === 4) { year = parseInt(parts[0], 10); month = parseInt(parts[1], 10) - 1; day = parseInt(parts[2], 10); } 
                else { day = parseInt(parts[0], 10); month = parseInt(parts[1], 10) - 1; year = parseInt(parts[2], 10); if (year < 100) year += 2000; }
                const parsed = new Date(year, month, day);
                if (!isNaN(parsed)) return parsed;
            }
            return new Date(dateStr);
        }

        function parseFlexibleTime(timeStr) {
            if (!timeStr) return '14:00';
            timeStr = timeStr.toString().trim();
            if (!isNaN(timeStr) && timeStr.includes('.')) {
                const fraction = parseFloat(timeStr);
                if (fraction >= 0 && fraction < 1) {
                    const totalMinutes = Math.round(fraction * 24 * 60);
                    const h = Math.floor(totalMinutes / 60) % 24;
                    const m = totalMinutes % 60;
                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                }
            }
            const ampmMatch = timeStr.match(/(\d{1,2})[:\.]?(\d{2})?\s*([AP]M)/i);
            if (ampmMatch) {
                let h = parseInt(ampmMatch[1], 10);
                const m = ampmMatch[2] || '00';
                const modifier = ampmMatch[3].toUpperCase();
                if (h === 12) h = 0; if (modifier === 'PM') h += 12;
                return `${String(h).padStart(2, '0')}:${m}`;
            }
            const timeMatch = timeStr.match(/(\d{1,2})[:\.](\d{2})/);
            if (timeMatch) return `${String(timeMatch[1]).padStart(2, '0')}:${timeMatch[2]}`;
            
            const hourMatch = timeStr.match(/^(\d{1,2})$/);
            if (hourMatch) {
                 const h = parseInt(hourMatch[1], 10);
                 if (h >= 0 && h < 24) return `${String(h).padStart(2, '0')}:00`;
            }
            return '14:00';
        }

        function sortFixturesByDate(fixtures) {
            fixtures.sort((a, b) => parseFlexibleDate(a.date) - parseFlexibleDate(b.date));
            fixtures.forEach(round => {
                if(round.matches) {
                    round.matches.sort((m1, m2) => {
                        const t1 = m1.time || "00:00";
                        const t2 = m2.time || "00:00";
                        return t1.localeCompare(t2);
                    });
                }
            });
            return fixtures;
        }

        function formatDateToLeagueString(dateObj) {
            const dayNames = ['PAZAR', 'PAZARTESİ', 'SALI', 'ÇARŞAMBA', 'PERŞEMBE', 'CUMA', 'CUMARTESİ'];
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year = dateObj.getFullYear();
            const dayName = dayNames[dateObj.getDay()];
            return `${day}.${month}.${year} ${dayName}`;
        }

        // --- EKRAN HESAPLAMALARI VE RENDER FONKSİYONLARI ---
        function calculateGroupStandings(targetGroup) {
            const currentLeague = state.leagues[state.activeSport];
            const stats = {};
            const groupTeams = currentLeague.teams.filter(t => t.group === targetGroup);
            
            groupTeams.forEach(team => {
                stats[team.id] = { id: team.id, name: team.name, played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, gd: 0, points: 0, group: team.group, redCards: 0, manager: team.manager, coach: team.coach };
            });

            currentLeague.fixtures.forEach(round => {
                round.matches.forEach(match => {
                    if(match.cards) { match.cards.forEach(card => { if(stats[card.teamId]) stats[card.teamId].redCards++; }); }

                    if (match.homeScore !== '' && match.awayScore !== '') {
                        const hScore = parseFloat(match.homeScore);
                        const aScore = parseFloat(match.awayScore);
                        if (stats[match.home.id] && stats[match.away.id]) {
                            if(getTeam(match.home.id, state.activeSport).group === targetGroup || getTeam(match.away.id, state.activeSport).group === targetGroup) {
                                stats[match.home.id].played++; stats[match.away.id].played++;
                                stats[match.home.id].gf += hScore; stats[match.home.id].ga += aScore; stats[match.home.id].gd += (hScore - aScore);
                                stats[match.away.id].gf += aScore; stats[match.away.id].ga += hScore; stats[match.away.id].gd += (aScore - hScore);
                                
                                if (state.activeSport.includes('basketbol')) {
                                    if (hScore > aScore) { stats[match.home.id].won++; stats[match.home.id].points += 2; stats[match.away.id].lost++; stats[match.away.id].points += 1; }
                                    else if (aScore > hScore) { stats[match.away.id].won++; stats[match.away.id].points += 2; stats[match.home.id].lost++; stats[match.home.id].points += 1; }
                                    else { stats[match.home.id].drawn++; stats[match.home.id].points += 1; stats[match.away.id].drawn++; stats[match.away.id].points += 1; }
                                } else if (state.activeSport.includes('voleybol')) { 
                                    if (hScore > aScore) {
                                        stats[match.home.id].won++; stats[match.away.id].lost++;
                                        if (hScore === 3 && aScore < 2) { stats[match.home.id].points += 3; }
                                        else if (hScore === 3 && aScore === 2) { stats[match.home.id].points += 2; stats[match.away.id].points += 1; }
                                        else { stats[match.home.id].points += 3; }
                                    } else if (aScore > hScore) {
                                        stats[match.away.id].won++; stats[match.home.id].lost++;
                                        if (aScore === 3 && hScore < 2) { stats[match.away.id].points += 3; }
                                        else if (aScore === 3 && hScore === 2) { stats[match.away.id].points += 2; stats[match.home.id].points += 1; }
                                        else { stats[match.away.id].points += 3; }
                                    } else { stats[match.home.id].points += 1; stats[match.away.id].points += 1; }
                                } else {
                                    if (hScore > aScore) { stats[match.home.id].won++; stats[match.home.id].points += 3; stats[match.away.id].lost++; }
                                    else if (aScore > hScore) { stats[match.away.id].won++; stats[match.away.id].points += 3; stats[match.home.id].lost++; }
                                    else { stats[match.home.id].drawn++; stats[match.home.id].points += 1; stats[match.away.id].drawn++; stats[match.away.id].points += 1; }
                                }
                            }
                        }
                    }
                });
            });

            return Object.values(stats).sort((a, b) => b.points - a.points || b.gd - a.gd || b.gf - a.gf);
        }

                        <!-- Genel (Ana Sayfa) -->
                        <div>
                            <button onclick="window.handleNav('home')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-bold transition text-left ${state.currentView === 'home' ? currentSport.color + ' text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}">
                                <div class="opacity-80">${icons.home}</div>
                                Ana Sayfa (Kurallar)
                            </button>
                        </div>

                        <hr class="border-gray-100 -my-2">

                        <!-- Branşlar -->
                        <div>
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 pl-2">Spor Branşları</h3>
                            <div class="flex flex-col gap-1">
                                ${Object.values(SPORTS).map(sport => `
                                    <button onclick="window.handleNav('dashboard', '${sport.id}')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-bold transition text-left ${state.activeSport === sport.id && state.currentView === 'dashboard' ? currentSport.color + ' text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}">
                                        <div class="opacity-80">${sport.icon}</div>
                                        ${sport.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <hr class="border-gray-100">

                        <!-- Turnuva Yönetimi -->
                        <div>
                            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 pl-2">Turnuva</h3>
                            <button onclick="window.handleNav('knockout')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-bold transition text-left ${state.currentView === 'knockout' ? currentSport.color + ' text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}">
                                <div class="opacity-80">${icons.bracket}</div>
                                Eleme Aşaması (Final)
                            </button>
                        </div>

                        <hr class="border-gray-100">

                        <!-- Ayarlar -->
                        <div>
                            <button onclick="window.handleNav('settings')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-bold transition text-left ${state.currentView === 'settings' ? currentSport.color + ' text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}">
                                <div class="opacity-80">${icons.settings}</div>
                                Sistem Ayarları
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            const currentSport = SPORTS[state.activeSport.toUpperCase()];

            // Eksik veri yapılarını koruma
            if(!state.leagues.futbol_erkek) state.leagues.futbol_erkek = { teams: [], fixtures: [], knockouts: JSON.parse(JSON.stringify(DEFAULT_KNOCKOUT)), isStarted: false, isPlanning: false };
            if(!state.leagues.futsal_erkek) state.leagues.futsal_erkek = { teams: [], fixtures: [], knockouts: JSON.parse(JSON.stringify(DEFAULT_KNOCKOUT)), isStarted: false, isPlanning: false };

            if(!state.leagues[state.activeSport].knockouts) {
                Object.keys(state.leagues).forEach(k => {
                    if(!state.leagues[k].knockouts) state.leagues[k].knockouts = JSON.parse(JSON.stringify(DEFAULT_KNOCKOUT));
                });
            }
            if(!state.predefinedTeams) state.predefinedTeams = { basketbol: [], voleybol: [], futbol: [], futsal: [] };
            if(!state.predefinedTeams.futbol) state.predefinedTeams.futbol = [];
            if(!state.predefinedTeams.futsal) state.predefinedTeams.futsal = [];
            if(!state.rules) state.rules = { futbol: [], futsal: [], basketbol: [], voleybol: [] };

            let html = `
                ${renderSidePanel()}
                <!-- TEPE BARI -->
                <div class="${currentSport.color} text-white p-4 shadow-lg sticky top-0 z-40 transition-colors duration-500 print:hidden relative">
                    <div class="max-w-7xl mx-auto flex justify-between items-center h-12 relative">
                        <!-- Menü Butonu (Sol) -->
                        <button onclick="window.togglePanel()" class="p-2 hover:bg-white/20 rounded-md transition z-50">
                            ${icons.menu}
                        </button>
                        
                        <!-- Başlık (Tam Orta) -->
                        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center gap-3 w-full justify-center pointer-events-none">
                            <div class="w-6 h-6 md:w-8 md:h-8">${icons.trophy}</div>
                            <h1 class="text-lg md:text-2xl font-bold whitespace-nowrap">31. SK Rektörlük Kupası</h1>
                        </div>

                        <!-- KAYDETME DURUM GÖSTERGESİ (Sağ) -->
                        <div id="save-status" class="z-50 text-[10px] md:text-xs font-medium text-right min-w-[100px] opacity-90"></div>
                    </div>
                </div>
                <div class="max-w-7xl mx-auto p-4 md:p-6 pb-20">
            `;

            if (state.currentView === 'home') {
                html += renderHome();
            } else if (state.currentView === 'settings') {
                html += renderSettings();
            } else if (state.currentView === 'knockout') {
                html += renderKnockout();
            } else {
                const activeLeague = state.leagues[state.activeSport];
                if (!activeLeague.isStarted && activeLeague.fixtures.length === 0) {
                    if (state.isLoggedIn) {
                        html += `
                            <div class="bg-white rounded-xl shadow-md p-6 max-w-2xl mx-auto border fade-in mt-4">
                                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">${icons.users} Takım Kayıt (${currentSport.name})</h2>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                                    <input type="text" id="teamInput" list="teamDatalist" placeholder="Takım Adı Seç/Yaz" class="border rounded p-2 text-sm outline-none focus:ring-2 focus:ring-blue-400">
                                    <select id="groupSelect" class="border rounded p-2 text-sm bg-white">
                                        <option value="A">A Grubu</option><option value="B">B Grubu</option>
                                        <option value="C">C Grubu</option><option value="D">D Grubu</option>
                                    </select>
                                    <input type="text" id="managerInput" placeholder="Yönetici" class="border rounded p-2 text-sm outline-none">
                                    <input type="text" id="coachInput" placeholder="Antrenör" class="border rounded p-2 text-sm outline-none">
                                </div>
                                <button onclick="window.addTeam('teamInput', 'groupSelect', 'managerInput', 'coachInput')" class="w-full bg-blue-600 text-white py-2 rounded font-bold mb-6 hover:bg-blue-700 transition">+ Takım Ekle</button>
                                <div class="space-y-2 mb-6 max-h-60 overflow-y-auto custom-scrollbar">
                                    ${activeLeague.teams.map(t => `<div class="flex justify-between p-2 bg-gray-50 border rounded text-xs"><span>[${t.group}] <b>${t.name}</b></span><button onclick="window.removeTeam(${t.id})" class="text-red-500">${icons.trash}</button></div>`).join('')}
                                </div>
                                <button onclick="window.startLeague()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold shadow-md hover:bg-green-700 transition">Ligi Başlat</button>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="bg-white rounded-xl shadow-md p-12 max-w-2xl mx-auto border text-center fade-in mt-8">
                                <div class="w-20 h-20 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-6">${icons.trophy}</div>
                                <h2 class="text-2xl font-bold text-gray-800 mb-2">Lig Henüz Başlamadı</h2>
                                <p class="text-gray-500 italic">Takımlar ve fikstür kesinleştiğinde veriler burada yayınlanacaktır.</p>
                            </div>
                        `;
                    }
                } else {
                    html += renderDashboard();
                }
            }

            html += `</div>`;
            app.innerHTML = html;
            
            // Ekran yenilendiğinde kaydetme durumunu tekrar bas
            if(window.renderSaveStatus) window.renderSaveStatus();
        }

        render();
        initFirebase();

    </script>
</body>
</html>
